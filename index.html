<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>静态页面测试</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #7cc6ff, #b3f3ff);
      }
      .card {
        width: min(560px, 92vw);
        background: rgba(255, 255, 255, 0.85);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
        text-align: center;
      }
      h1 { margin-top: 0; }
      button {
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 15px;
        cursor: pointer;
        background: #2d7dff;
        color: #fff;
      }
      #count {
        font-weight: 700;
        color: #0f4fd6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>✅ 功能测试页</h1>
      <p>这是一个随手做的静态页面，用来测试页面展示和基础交互。</p>
      <p>按钮点击次数：<span id="count">0</span></p>
      <button id="btn" type="button">点我 +1</button>
    </main>

    <script>
      const countEl = document.getElementById('count');
      const btn = document.getElementById('btn');
      let count = 0;

      btn.addEventListener('click', () => {
        count += 1;
        countEl.textContent = count;
      });
    </script>
  </body>
</html>
